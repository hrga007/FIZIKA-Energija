:root{font-family:Inter,system-ui,Segoe UI,sans-serif;--bg:#f6f8f4;--card:#fff;--ink:#10201d;--muted:#66736e;--line:#dce6df;--teal:#12847e;--green:#438d52;--coral:#d86454;--amber:#d99023;--blue:#5364b1;--r:8px}*{box-sizing:border-box}body{margin:0;background:linear-gradient(#fbfcfa,var(--bg));color:var(--ink)}button,input,select{font:inherit}button{cursor:pointer}.app{min-height:100vh}.top{position:sticky;top:0;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--line);background:#ffffffee;backdrop-filter:blur(12px)}h1,h2,h3,p{margin-top:0}.top h1{font-size:1.05rem;margin:0}.label{color:var(--teal);font-size:.72rem;font-weight:900;text-transform:uppercase}.icon{display:grid;place-items:center;width:2.4rem;height:2.4rem;border:1px solid var(--line);border-radius:var(--r);background:#fff}.main{max-width:1080px;margin:auto;padding:1rem 1rem 6.3rem}.stack{display:grid;gap:1rem}.card,.hero{padding:1rem;border:1px solid var(--line);border-radius:var(--r);background:#fff;box-shadow:0 14px 35px #10251f14}.hero h2,.card h2{font-size:clamp(1.45rem,6vw,2.35rem);line-height:1.08}.muted{color:var(--muted);line-height:1.5}.tabs,.topics{display:flex;gap:.45rem;overflow:auto;padding:.35rem;border:1px solid var(--line);border-radius:var(--r);background:#fff}.tabs button,.topics button{border:0;border-radius:6px;background:transparent;color:var(--muted);font-weight:900;white-space:nowrap}.tabs button{min-height:2.45rem;padding:.35rem .7rem}.tabs button.active{background:var(--ink);color:white}.topics button{display:grid;min-width:9rem;min-height:6.7rem;place-items:center;border:1px solid var(--line);font-size:1rem}.topics button.active{border-color:var(--teal);background:#fff;color:var(--teal);box-shadow:inset 0 -4px 0 var(--teal)}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:5;display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--line);background:#fffffff0}.bottom button{display:grid;gap:.18rem;place-items:center;min-height:4rem;border:0;background:transparent;color:var(--muted);font-size:.68rem;font-weight:800}.bottom button.active{color:var(--teal)}.side{display:none}.chip{display:inline-flex;padding:.55rem .7rem;border-radius:var(--r);background:#e6f5f2;color:var(--teal);font-family:Consolas,monospace;font-weight:900}.grid{display:grid;gap:.75rem}.two{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}.quick{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}.quick button,.row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:.65rem;min-height:4.6rem;padding:.85rem;border:1px solid var(--line);border-radius:var(--r);background:#fff;text-align:left;color:var(--ink)}.ring{display:grid;width:5.5rem;height:5.5rem;place-items:center;border-radius:50%;background:conic-gradient(var(--teal) var(--p),#e7eeea 0)}.ring b{display:grid;width:4.1rem;height:4.1rem;place-items:center;border-radius:50%;background:#fff}.progress{display:grid;grid-template-columns:5.8rem 1fr 1fr;gap:.8rem;align-items:center}.map{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:1rem;min-height:16rem;place-items:center;background:linear-gradient(#fff,#eff9f6);overflow:hidden}.map:before,.map:after{position:absolute;inset:50% 12%;height:2px;background:linear-gradient(90deg,var(--teal),var(--green),var(--coral),#397db3);content:''}.map:after{transform:rotate(90deg)}.node,.center{position:relative;z-index:1;display:grid;place-items:center;min-height:3.1rem;padding:.65rem;border-radius:var(--r);background:#fff;font-weight:900;text-align:center}.node{border:2px solid currentColor}.teal{color:var(--teal)}.green{color:var(--green)}.coral{color:var(--coral)}.blue{color:#397db3}.center{position:absolute;left:50%;top:50%;width:12rem;transform:translate(-50%,-50%);background:var(--teal);color:#fff}.tile{display:grid;gap:.35rem;min-height:7.2rem;place-items:center;padding:.8rem;border:1px solid var(--line);border-radius:var(--r);background:#e6f5f2;text-align:center}.tile:nth-child(2){background:#ffe8e4}.tile b{font-family:Consolas,monospace;color:var(--teal);font-size:1.18rem}.tile:nth-child(2) b{color:var(--coral)}.table{overflow:auto}table{width:100%;min-width:500px;border-collapse:collapse}td,th{padding:.65rem;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:var(--muted);font-size:.75rem;text-transform:uppercase}.note,.example{padding:.8rem;border-radius:var(--r);background:#f2f6f4}.example{background:#eaf7f3}.conf{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem}.conf button,.btn{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;min-height:2.55rem;padding:.65rem .8rem;border:1px solid var(--line);border-radius:var(--r);background:#fff;color:var(--ink);font-weight:900}.conf button.active,.btn.primary{background:var(--teal);border-color:var(--teal);color:white}.lab{display:grid;gap:1rem}.field,.slider{display:grid;gap:.35rem;color:var(--muted);font-weight:800}.field input,.field select,select{min-height:2.7rem;border:1px solid var(--line);border-radius:var(--r);padding:.5rem;background:#fff;color:var(--ink)}.slider span{display:flex;justify-content:space-between}.slider input{width:100%;accent-color:var(--teal)}.result{padding:.9rem;border-radius:var(--r);background:var(--ink);color:#fff}.result b{display:block;font-size:1.8rem}.visual{position:relative;min-height:215px;border-radius:var(--r);background:linear-gradient(145deg,#edf8f5,#fff4d9);overflow:hidden}.arrow{position:absolute;left:14%;top:55%;height:.42rem;border-radius:999px;background:var(--coral)}.arrow:after{position:absolute;right:-.55rem;top:-.35rem;border-block:.58rem solid transparent;border-left:.68rem solid var(--coral);content:''}.box{position:absolute;right:16%;bottom:22%;width:3.2rem;height:2.8rem;border:3px solid #8b5a24;border-radius:var(--r);background:#e7b66d}.ball{position:absolute;left:42%;top:35%;width:4rem;height:4rem;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,var(--green));animation:roll 2.4s linear infinite}@keyframes roll{from{transform:translateX(-55px) rotate(0)}to{transform:translateX(55px) rotate(360deg)}}.thermo,.tube{position:absolute;right:24%;bottom:16%;width:2rem;height:8.5rem;border:3px solid var(--ink);border-radius:999px;background:#fff;overflow:hidden}.thermo span,.tube span{position:absolute;inset:auto .25rem .25rem;border-radius:999px;background:var(--coral)}.spring{position:absolute;left:12%;top:45%;height:3rem;border-block:.35rem solid var(--blue);background:repeating-linear-gradient(90deg,transparent 0 .6rem,var(--blue) .6rem .9rem)}.particles span{position:absolute;left:calc(12% + (var(--i)%6)*13%);top:calc(16% + (var(--i)%4)*18%);width:.7rem;height:.7rem;border-radius:50%;background:var(--blue);animation:part 1.5s ease-in-out infinite alternate;animation-delay:calc(var(--i)*-.12s)}@keyframes part{from{transform:translate(-5px,-5px)}to{transform:translate(12px,10px)}}.answers{display:grid;gap:.55rem}.answers button{min-height:3rem;border:1px solid var(--line);border-radius:var(--r);background:#fff;text-align:left;padding:.75rem;font-weight:900}.answers button.ok{background:#e5f4df;border-color:var(--green)}.answers button.no{background:#ffe6e1;border-color:var(--coral)}.drawerBtn{position:fixed;right:1rem;bottom:4.8rem;z-index:8;border:0;border-radius:var(--r);background:var(--ink);color:#fff;padding:.75rem .9rem;font-weight:900}.shade{position:fixed;inset:0;z-index:9;background:#10251f66;display:grid;align-items:end}.drawer{max-height:82vh;overflow:auto;padding:1rem;border-radius:14px 14px 0 0;background:#fff}.conv{display:grid;gap:.55rem}.conv article{padding:.75rem;border:1px solid var(--line);border-radius:var(--r)}.hidden{display:none!important}@media(min-width:760px){.app{display:grid;grid-template-columns:17.5rem 1fr}.top,.bottom{display:none}.side{position:sticky;top:0;display:block;height:100vh;padding:1rem;border-right:1px solid var(--line);background:#ffffffc9}.brand{display:flex;gap:.7rem;align-items:center;margin-bottom:1rem}.brandMark{display:grid;width:2.7rem;height:2.7rem;place-items:center;border-radius:var(--r);background:var(--ink);color:#fff;font-weight:900}.side button{display:flex;align-items:center;gap:.55rem;width:100%;min-height:2.7rem;margin:.2rem 0;padding:0 .75rem;border:0;border-radius:var(--r);background:transparent;color:var(--muted);font-weight:900;text-align:left}.side button.active{background:var(--ink);color:#fff}.main{padding:1.5rem 1.5rem 4rem}.lab,.solver{grid-template-columns:1fr 1fr}.topics{overflow:visible}.topics button{min-width:0}.drawerBtn{bottom:1rem}.shade{place-items:center}.drawer{width:min(680px,calc(100vw - 2rem));border-radius:var(--r)}}

</head><body><div class='app'><aside class='side'><div class='brand'><div class='brandMark'>F</div><div><b>Fizika radionica</b><br><small>Rad, energija, toplina</small></div></div><nav id='sideNav'></nav></aside><div><header class='top'><button class='icon'>☰</button><div><small class='label'>Fizika</small><h1>Fizika radionica</h1></div><div class='mark'>⚛</div></header><main class='main'><div id='view' class='stack'></div></main><nav class='bottom' id='bottomNav'></nav><button class='drawerBtn' onclick='openConv()'>⌁ Pretvorbe jedinica</button></div></div><div id='shade' class='shade hidden' onclick='closeConv()'><section class='drawer' onclick='event.stopPropagation()'><button class='icon' style='float:right' onclick='closeConv()'>×</button><p class='label'>Pomoćni panel</p><h2>Pretvorbe jedinica</h2><div id='conv' class='conv'></div></section></div>
<script>
const $=s=>document.querySelector(s),view=$('#view');const nav=[['home','⌂','Početak'],['map','⌗','Mapa'],['formulas','▤','Formule'],['labs','⚗','Laboratoriji'],['solver','☷','Rješavač'],['quiz','♧','Kviz'],['cheat','☑','Šalabahter'],['progress','♕','Napredak']];const F=[['rad','mehanika','Rad','W = F · s','Rad nastaje kada sila pomiče tijelo na nekom putu.','W ili A: rad: J|F: sila: N|s: put: m','Guram kutiju i ona se pomakne.'],['snaga','mehanika','Snaga','P = W / t','Snaga pokazuje koliko brzo se obavlja rad ili prenosi energija.','P: snaga: W|W: rad: J|t: vrijeme: s','Tko isti posao napravi brže, snažniji je.'],['kin','energija','Kinetička energija','Ek = m · v² / 2','Kinetička energija je energija gibanja.','Ek: kinetička energija: J|m: masa: kg|v: brzina: m/s','Autić koji se brzo giba.'],['grav','energija','Gravitacijska potencijalna','Ep = m · g · h','Energija koju tijelo ima zbog visine. Ako je zadana težina: Ep = G · h.','Ep: energija visine: J|m: masa: kg|g: ubrzanje: N/kg|h: visina: m|G: težina: N','Knjiga na polici.'],['elas','energija','Elastična potencijalna','Eel = k · x² / 2','Energija pohranjena u rastegnutoj ili stisnutoj opruzi.','Eel: elastična energija: J|k: konstanta opruge: N/m|x: produljenje: m','Rastegnuta gumica.'],['pot','energija','Potencijalna energija','položaj ili napetost','Pohranjena energija zbog položaja ili deformacije.','Ep: gravitacijska: J|Eel: elastična: J','Nešto je spremno napraviti promjenu.'],['unut','tvar','Unutarnja energija','U','Ukupna energija svih čestica u tijelu. Temperatura opisuje prosječnu brzinu čestica.','U: unutarnja energija: J','Čestice se brže gibaju kad je toplije.'],['top','toplina','Toplina','Q = m · c · ΔT','Toplina je energija koja prelazi s toplijeg tijela na hladnije.','Q: toplina: J|m: masa: kg|c: specifični toplinski kapacitet: J/kg°C|ΔT: promjena temperature: °C ili K','Lonac vode koji se zagrijava.'],['rast','toplina','Toplinsko rastezanje tekućina','ΔV = V₀ · β · ΔT','Zagrijana tekućina se obično širi jer čestice zauzimaju više prostora. Konačno: V = V₀ + ΔV.','ΔV: promjena volumena: m³ ili L|V₀: početni volumen: m³ ili L|β: koeficijent širenja: 1/°C|ΔT: promjena temperature: °C','Tekućina u termometru raste.']];const conv=[['cm','m','80 cm = 0,8 m','podijeli sa 100'],['m','cm','1 m = 100 cm','pomnoži sa 100'],['g','kg','500 g = 0,5 kg','podijeli sa 1000'],['kg','g','1 kg = 1000 g','pomnoži sa 1000'],['min','s','2 min = 120 s','pomnoži sa 60'],['kJ','J','1 kJ = 1000 J','pomnoži sa 1000'],['J','kJ','1000 J = 1 kJ','podijeli sa 1000']];let page='home',lab='rad',q=0,pick=null,conf=JSON.parse(localStorage.fizikaConf||'{}'),best=+(localStorage.fizikaBest||0);function save(){localStorage.fizikaConf=JSON.stringify(conf);localStorage.fizikaBest=best}function setPage(p){page=p;pick=null;render()}function renderNav(){let h=nav.map(n=>`<button class='${page==n[0]?'active':''}' onclick="setPage('${n[0]}')"><span>${n[1]}</span><span>${n[2]}</span></button>`).join('');sideNav.innerHTML=h;bottomNav.innerHTML=nav.slice(0,5).map(n=>`<button class='${page==n[0]?'active':''}' onclick="setPage('${n[0]}')"><span>${n[1]}</span><span>${n[2]}</span></button>`).join('')}function known(){return F.filter(x=>conf[x[0]]=='known').length}function pct(){return Math.round(known()/F.length*100)}function render(){renderNav();({home,map,formulas,labs,solver,quiz,cheat,progress}[page])()}function miniMap(){return `<div class='map'><button class='node teal' onclick="setPage('formulas')">Rad</button><button class='node green' onclick="setPage('formulas')">Energija</button><button class='node coral' onclick="setPage('labs')">Toplina</button><button class='node blue' onclick="setPage('formulas')">Snaga</button><div class='center'>Rad, energija, snaga i toplina</div></div>`}function home(){view.innerHTML=`<section class='hero'><div class='topics'><button class='active' onclick="setPage('formulas')">→<b>Rad</b></button><button onclick="setPage('labs')">⌁<b>Energija</b></button><button onclick="setPage('labs')">♨<b>Toplina</b></button><button onclick="setPage('labs')">⚗<b>Laboratorij</b></button></div><article class='card'><p class='label'>Moj napredak</p><h2>${pct()}% ukupno</h2><p class='muted'>${known()}/${F.length} formula označeno kao “znam dobro”.</p><div class='progress'><div class='ring' style='--p:${pct()}%'><b>${pct()}%</b></div><b>🏆<br>Kviz čeka</b><b>📖<br>${F.length} formula</b></div></article><article class='card'><p class='label'>Mapa pojmova</p><h2>Dodirni čvor za istraživanje</h2>${miniMap()}</article><article class='card'><p class='label'>Važne formule</p><h2>Brzi pogled</h2><div class='two'><button class='tile' onclick="setPage('formulas')"><b>W = F · s</b><span>Rad = sila · put</span><small>J</small></button><button class='tile' onclick="setPage('formulas')"><b>Q = m · c · ΔT</b><span>Toplina zagrijavanja</span><small>J</small></button></div></article><div class='quick'><button onclick="setPage('quiz')">♧<span><b>Kviz</b><small class='muted'>Provjeri znanje</small></span>→</button><button onclick='openConv()'>⌁<span><b>Pretvorbe jedinica</b><small class='muted'>Uvijek dostupno</small></span>→</button></div></section>`}function map(){view.innerHTML=`<section class='card'><p class='label'>Početna mentalna mapa</p><h2>Fizika: rad, energija, snaga i toplina</h2><p class='muted'>Klikni pojam i vidi značenje, formulu, jedinicu rezultata i primjer iz života.</p>${miniMap()}</section><section class='grid'>${F.map(x=>`<article class='card'><p class='label'>${x[1]}</p><h2>${x[2]}</h2><div class='chip'>${x[3]}</div><p class='muted'>${x[4]}</p><p>${x[6]}</p><button class='btn primary' onclick="setPage('labs')">Vježbaj ovo →</button></article>`).join('')}</section>`}function unitTable(s){return `<div class='table'><table><tr><th>Oznaka</th><th>Značenje</th><th>Jedinica</th></tr>${s.split('|').map(r=>{let a=r.split(':');return `<tr><td>${a[0]}</td><td>${a[1]}</td><td>${a[2]}</td></tr>`}).join('')}</table></div>`}function formulas(){view.innerHTML=`<section class='hero'><p class='label'>Formula kartice</p><h2>Svaka formula ima značenje, jedinice i vježbu.</h2><p class='muted'>Prvo običnim jezikom, zatim formula, oznake, primjer i mini-zadatak.</p></section>${F.map(x=>`<article class='card grid'><p class='label'>${x[1]}</p><h2>${x[2]}</h2><div class='chip'>${x[3]}</div><p>${x[4]}</p>${unitTable(x[5])}<div class='example'><b>Primjer</b><ol><li>Zapiši zadano.</li><li>Odaberi formulu: ${x[3]}</li><li>Uvrsti brojeve i obavezno napiši jedinicu.</li></ol></div><p class='note'>Slika za pamćenje: ${x[6]}</p><details><summary><b>Tipične greške</b></summary><ul><li>Pazi na pretvorbu jedinica.</li><li>Ne preskači oznake i mjernu jedinicu odgovora.</li></ul></details><details><summary><b>Mini-zadatak</b></summary><p>Objasni svojim riječima kada koristiš formulu ${x[3]}.</p></details><div class='conf'>${['unknown','partial','known'].map(c=>`<button class='${conf[x[0]]==c?'active':''}' onclick="conf['${x[0]}']='${c}';save();formulas()">${c=='unknown'?'Ne znam':c=='partial'?'Djelomično znam':'Znam dobro'}</button>`).join('')}</div></article>`).join('')}<section class='card'><p class='label'>Flash kartice</p><h2>Mini-ponavljanje</h2><div class='grid'>${F.map(x=>`<details class='note'><summary>Koja je formula za ${x[2]}?</summary><b>${x[3]}</b><p>${x[4]}</p></details>`).join('')}</div></section>`}function labs(){view.innerHTML=`<section class='hero'><p class='label'>Interaktivni laboratoriji</p><h2>Promijeni vrijednosti i odmah vidi što se događa.</h2><p class='muted'>Klizači prikazuju rezultat s mjernom jedinicom.</p></section><div class='tabs'>${[['rad','Rad'],['snaga','Snaga'],['kin','Kinetička'],['grav','Visina'],['elas','Opruga'],['top','Toplina'],['unut','Čestice'],['rast','Tekućina']].map(x=>`<button class='${lab==x[0]?'active':''}' onclick="lab='${x[0]}';labs()">${x[1]}</button>`).join('')}</div><section class='card'>${labView()}</section>`}function sl(id,l,min,max,val,u,st=1){return `<label class='slider'><span>${l}<b id='${id}v'>${val} ${u}</b></span><input id='${id}' type='range' min='${min}' max='${max}' step='${st}' value='${val}' oninput='calcLab()'></label>`}function labView(){setTimeout(calcLab);let title={rad:'Laboratorij rada',snaga:'Laboratorij snage',kin:'Kinetička energija',grav:'Energija visine',elas:'Elastična energija',top:'Toplina',unut:'Unutarnja energija',rast:'Rastezanje tekućina'}[lab];let form={rad:'W = F · s',snaga:'P = W / t',kin:'Ek = m · v² / 2',grav:'Ep = m · g · h',elas:'Eel = k · x² / 2',top:'Q = m · c · ΔT',unut:'U',rast:'ΔV = V₀ · β · ΔT'}[lab];let controls={rad:sl('a','Sila F',0,100,35,'N')+sl('b','Put s',0,20,8,'m'),snaga:sl('a','Rad W',0,1000,400,'J',10)+sl('b','Vrijeme t',1,60,20,'s'),kin:sl('a','Masa m',.1,100,8,'kg',.1)+sl('b','Brzina v',0,50,12,'m/s'),grav:sl('a','Masa m',.1,50,5,'kg',.1)+sl('b','Visina h',0,20,6,'m',.5),elas:sl('a','k',1,1000,160,'N/m')+sl('b','x',0,1,.25,'m',.01),top:sl('a','Masa m',.1,10,1,'kg',.1)+`<label class='field'>Tvar<select id='c' onchange='calcLab()'><option value='4200'>voda 4200</option><option value='450'>željezo 450</option><option value='900'>aluminij 900</option><option value='380'>bakar 380</option></select></label>`+sl('b','T₁',-20,120,20,'°C')+sl('d','T₂',-20,120,80,'°C'),unut:`<div class='tabs'><button onclick="temp='niska';calcLab()">niska</button><button onclick="temp='srednja';calcLab()">srednja</button><button onclick="temp='visoka';calcLab()">visoka</button></div>`,rast:sl('a','V₀',.1,10,1,'L',.1)+sl('b','β',.0001,.003,.001,'1/°C',.0001)+sl('d','T₂',-20,120,60,'°C')}[lab];let vis=lab=='kin'?'<span class="ball"></span>':lab=='top'?'<span class="thermo"><span id="liq"></span></span>':lab=='rast'?'<span class="tube"><span id="liq"></span></span>':lab=='elas'?'<span class="spring" id="spring"></span>':lab=='unut'?Array.from({length:18},(_,i)=>`<span style='--i:${i}'></span>`).join(''):'<span class="arrow" id="arr"></span><span class="box" id="box"></span>';return `<div class='lab'><div class='grid'><p class='label'>${form}</p><h2>${title}</h2>${controls}<div class='result'>Rezultat<b id='out'></b></div><p class='muted'>Promijeni vrijednosti i promatraj rezultat.</p></div><div class='visual ${lab=='unut'?'particles':''}'>${vis}</div></div>`}let temp='srednja';function n(id){return +($(id)?.value||0)}function calcLab(){['a','b','d'].forEach(i=>{let e=$('#'+i),v=$('#'+i+'v');if(e&&v)v.textContent=e.value+' '+v.textContent.split(' ').slice(1).join(' ')});let r=0;if(lab=='rad'){r=n('#a')*n('#b');out.textContent=r.toFixed(0)+' J';arr.style.width=(20+n('#a')*.55)+'%'}else if(lab=='snaga'){out.textContent=(n('#a')/n('#b')).toFixed(1)+' W'}else if(lab=='kin'){out.textContent=(n('#a')*n('#b')**2/2).toFixed(1)+' J'}else if(lab=='grav'){out.textContent=(n('#a')*10*n('#b')).toFixed(1)+' J';box.style.bottom=(18+n('#b')*3)+'%'}else if(lab=='elas'){out.textContent=(n('#a')*n('#b')**2/2).toFixed(2)+' J';spring.style.width=(30+n('#b')*55)+'%'}else if(lab=='top'){let dt=n('#d')-n('#b'),q=n('#a')*(+c.value)*dt;out.textContent=`ΔT = ${dt} °C, Q = ${q.toFixed(0)} J`;liq.style.height=Math.max(10,Math.min(90,(n('#d')+20)/140*100))+'%'}else if(lab=='rast'){let dt=n('#d')-20,dv=n('#a')*n('#b')*dt;out.textContent=`ΔV = ${dv.toFixed(3)} L, V = ${(n('#a')+dv).toFixed(3)} L`;liq.style.height=Math.max(12,Math.min(90,32+dt))+'%'}else out.textContent=temp=='visoka'?'čestice se brzo gibaju':temp=='niska'?'čestice se sporo gibaju':'čestice se srednje brzo gibaju'}function solver(){view.innerHTML=`<section class='hero'><p class='label'>Rješavač zadataka</p><h2>Korak po korak od zadanog do odgovora.</h2></section><section class='card lab'><div class='grid'><label class='field'>Vrsta<select id='kind' onchange='solveNow()'><option value='rad'>Rad</option><option value='snaga'>Snaga</option><option value='kin'>Kinetička</option><option value='top'>Toplina</option></select></label><label class='field'>Broj 1<input id='x' type='number' value='20'></label><label class='field'>Broj 2<input id='y' type='number' value='5'></label><label class='field'>Broj 3<input id='z' type='number' value='10'></label><button class='btn primary' onclick='solveNow()'>Riješi</button></div><div class='note'><h2>Rješenje</h2><ol id='steps'></ol></div></section><section class='card'><p class='label'>Testni zadatak</p><details><summary>Loptica težine 0,5 N pada s 1 m i odbija se na 80 cm.</summary><ol><li>80 cm = 0,8 m</li><li>E₁ = 0,5 · 1 = 0,5 J</li><li>E₂ = 0,5 · 0,8 = 0,4 J</li><li>Izgubljeno = 0,1 J</li></ol></details></section>`;solveNow()}function solveNow(){let k=kind.value,x=+$('#x').value,y=+$('#y').value,z=+$('#z').value,s=[];if(k=='rad')s=[`Zadano: F = ${x} N, s = ${y} m`,`Traži se: rad W`,`Formula: W = F · s`,`Pretvorba: put mora biti u metrima`,`W = ${x} · ${y} = ${x*y} J`,`Odgovor s jedinicom: ${x*y} J`,`Značenje: veća sila ili put daju veći rad.`];if(k=='snaga')s=[`Zadano: W = ${x} J, t = ${y} s`,`Formula: P = W / t`,`P = ${x} / ${y} = ${(x/y).toFixed(1)} W`,`Kraće vrijeme znači veću snagu.`];if(k=='kin')s=[`Zadano: m = ${x} kg, v = ${y} m/s`,`Formula: Ek = m · v² / 2`,`Ek = ${x} · ${y}² / 2 = ${(x*y*y/2).toFixed(1)} J`,`Brzina je na kvadrat.`];if(k=='top')s=[`Zadano: m = ${x} kg, c = ${y}, ΔT = ${z} °C`,`Formula: Q = m · c · ΔT`,`Q = ${x} · ${y} · ${z} = ${(x*y*z).toFixed(0)} J`,`Veći c traži više topline.`];steps.innerHTML=s.map(a=>`<li>${a}</li>`).join('')}const Q=[['Koja formula se koristi za rad?',['W = F · s','P = W / t','Q = m · c · ΔT'],0,'Rad = sila · put.'],['Koja je jedinica za snagu?',['W','J','N'],0,'Snaga se mjeri u vatima, W.'],['Sila je 20 N, put 5 m. Koliki je rad?',['100 J','4 J','25 W'],0,'W = 20 · 5 = 100 J.'],['Masa 2 kg, brzina 4 m/s. Kolika je Ek?',['16 J','8 J','32 J'],0,'Ek = 2 · 4² / 2 = 16 J.'],['Voda: m = 1 kg, c = 4200, ΔT = 5 °C. Koliko je Q?',['21000 J','4205 J','840 J'],0,'Q = 1 · 4200 · 5 = 21000 J.']];function quiz(){let a=Q[q%Q.length];view.innerHTML=`<section class='hero'><p class='label'>Kviz</p><h2>Provjeri znanje u tri razine.</h2><p class='muted'>Kod greške dobivaš objašnjenje.</p></section><section class='card'><p class='label'>Pitanje ${q%Q.length+1}/${Q.length}</p><h2>${a[0]}</h2><div class='answers'>${a[1].map((x,i)=>`<button class='${pick==null?'':i==a[2]?'ok':i==pick?'no':''}' onclick='choose(${i})'>${x}</button>`).join('')}</div>${pick!=null?`<p class='note'>${a[3]}</p><button class='btn primary' onclick='q++;pick=null;quiz()'>Sljedeće pitanje</button>`:''}<p class='muted'>Najbolji rezultat: ${best}</p></section>`}function choose(i){pick=i;if(i==Q[q%Q.length][2])best++;save();quiz()}function cheat(){view.innerHTML=`<section class='hero'><p class='label'>Brzi šalabahter</p><h2>Sve formule na jednom mjestu.</h2></section><section class='card table'><table><tr><th>Pojam</th><th>Formula</th><th>Glavna ideja</th><th>Jedinica</th></tr>${F.map(x=>`<tr><td>${x[2]}</td><td>${x[3]}</td><td>${x[6]}</td><td>${x[5].split('|')[0].split(':')[2]}</td></tr>`).join('')}</table></section><section class='card'><p class='label'>Pretvorbe</p><div class='conv'>${convHtml()}</div></section>`}function progress(){view.innerHTML=`<section class='card'><p class='label'>Moj napredak</p><h2>${pct()}% formula označeno kao sigurno</h2><div class='progress'><div class='ring' style='--p:${pct()}%'><b>${pct()}%</b></div><b>${known()} znam dobro</b><b>${F.length-known()} za ponoviti</b></div><div class='grid'>${F.map(x=>`<button class='row' onclick="setPage('formulas')"><span>${x[2]}</span><b>${conf[x[0]]=='known'?'Znam dobro':conf[x[0]]=='partial'?'Djelomično znam':'Ne znam'}</b><span>→</span></button>`).join('')}</div><button class='btn' onclick='conf={};best=0;save();progress()'>Resetiraj lokalni napredak</button></section>`}function convHtml(){return conv.map(c=>`<article><b class='teal'>${c[0]} → ${c[1]}</b><p>${c[2]}</p><small class='muted'>${c[3]}</small></article>`).join('')}function openConv(){conv.innerHTML=convHtml();shade.classList.remove('hidden')}function closeConv(){shade.classList.add('hidden')}render();
</script></body></html>

let page='home',lab='rad',q=0,pick=null,temp='srednja';let confidence=JSON.parse(localStorage.fizikaConfidence||'{}');let best=Number(localStorage.fizikaBest||0);
function save(){localStorage.fizikaConfidence=JSON.stringify(confidence);localStorage.fizikaBest=String(best)}function realKnown(){return formulas.filter(f=>confidence[f[0]]==='known').length}function demoProgress(){return realKnown()?Math.round(realKnown()/formulas.length*100):72}function go(p){page=p;pick=null;render();scrollTo({top:0,behavior:'smooth'})}
function renderNav(){bottom.innerHTML=nav.map(n=>`<button class='${page===n[0]?'active':''}' data-page='${n[0]}'><span class='big'>${n[1]}</span><span>${n[2]}</span></button>`).join('')}
function topic(cls,label,icon,target){return `<button class='topic ${cls}' data-page='${target}'><span class='ill ${icon}'><span></span></span><span>${label}</span></button>`}
function mapCanvas(){return `<div class='mapCanvas'><span class='curve c1'></span><span class='curve c2'></span><span class='curve c3'></span><span class='curve c4'></span><div class='center'>Rad, energija,<br>snaga i toplina</div><button class='node mainNode nRad' data-page='formulas'><span class='ill push' style='transform:scale(.75)'><span></span></span>Rad</button><button class='node mainNode nEnergy' data-page='formulas'>Energija <span class='ill ball' style='transform:scale(.7)'></span></button><button class='node mainNode nHeat' data-page='labs'><span class='ill thermo' style='transform:scale(.72)'></span>Toplina</button><button class='node mainNode nPower' data-page='formulas'>Snaga</button><div class='subGroup subsRad'><span class='node subNode'>Sila (F)</span><span class='node subNode'>Pomak (s)</span><span class='node subNode'>Jedinični rad</span></div><div class='subGroup subsEnergy'><span class='node subNode'>Kinetička</span><span class='node subNode'>Potencijalna</span><span class='node subNode'>Mehanička</span></div><div class='subGroup subsHeat'><span class='node subNode'>Temperatura</span><span class='node subNode'>Toplina (Q)</span><span class='node subNode'>Provođenje</span></div><div class='subGroup subsPower'><span class='node subNode'>Rad u vremenu</span><span class='node subNode'>Snaga (P)</span><span class='node subNode'>Jedinice snage</span></div></div>`}
function home(){const p=demoProgress();view.innerHTML=`<section class='stack'><div class='topicGrid'>${topic('active','Rad','push','formulas')}${topic('energy','Energija','ball','labs')}${topic('heat','Toplina','thermo','labs')}${topic('lab','Laboratoriji','flask','labs')}</div><article class='card progressCard'><button class='arrow' data-page='progress'>›</button><h2>Moj napredak</h2><div class='progressRow'><div class='ring' style='--p:${p}%'><span>${p}%<small>UKUPNO</small></span></div><div class='stats'><div><span class='statIcon check'>✓</span><b>${realKnown()||8}</b><small>završeno</small></div><div><span class='statIcon star'>★</span><b>3</b><small>u tijeku</small></div><div><span class='statIcon book'>▰</span><b>2</b><small>lekcije</small></div><div><span class='statIcon clock'>◷</span><b>15</b><small>min danas</small></div></div></div></article><article class='card mind'><div class='mindHead'><h2>Mapa pojmova</h2><p class='muted'>Dodirni čvor za istraživanje</p></div>${mapCanvas()}</article><article class='card section'><div class='formulaHead'><div><h2>Važne formule</h2></div><b>1 / 2 ›</b></div><div class='formulaGrid'><button class='formulaTile' data-page='formulas'><strong>W = F · s</strong><span>Rad = sila · pomak</span><small>(joule, J)</small></button><button class='formulaTile heat' data-page='formulas'><strong>Q = m · c · ΔT</strong><span>Toplina = masa · specifični toplinski kapacitet · promjena temperature</span><small>(joule, J)</small></button></div></article><article class='card labCard'><div><h2>Laboratorij: Rad</h2><p class='muted'>Promijeni silu ili put i promatraj rad.</p><div class='labScene'><span class='person'></span><span class='crate' id='homeCrate'></span><span class='pushLine'></span><span class='measure'></span></div></div><div class='labControls'><label class='slider'><span>Sila (F)<b id='homeForceLabel'>20 N</b></span><input id='homeForce' type='range' min='0' max='100' value='20'></label><label class='slider'><span>Put (s)<b id='homeDistanceLabel'>3,0 m</b></span><input id='homeDistance' type='range' min='0' max='5' step='.1' value='3'></label></div><button class='resultBox' data-page='labs'><span>Rad (W)</span><b id='homeWork'>60 J</b><small>W = F · s<br>20 · 3,0 = 60</small></button></article><div class='quickGrid'><button class='quick' data-page='quiz'><span class='quickIcon'>☑</span><span><b>Kviz</b><small>Provjeri svoje znanje kroz zabavne zadatke</small></span><b>›</b></button><button class='quick blue' data-action='converter'><span class='quickIcon'>▦</span><span><b>Pretvorbe jedinica</b><small>Pretvori jedinice jednostavno i brzo</small></span><b>›</b></button></div></section>`;bindHomeLab()}
function bindHomeLab(){const f=document.querySelector('#homeForce'),d=document.querySelector('#homeDistance');if(!f)return;function calc(){const force=Number(f.value),dist=Number(d.value),work=force*dist;homeForceLabel.textContent=force+' N';homeDistanceLabel.textContent=dist.toFixed(1).replace('.',',')+' m';homeWork.textContent=Math.round(work)+' J';homeCrate.style.transform='translateX('+(dist*8)+'px)'}f.oninput=calc;d.oninput=calc;calc()}
function unitRows(units){return `<div class='tableWrap'><table><thead><tr><th>Oznaka</th><th>Značenje</th><th>Jedinica</th></tr></thead><tbody>${units.split(';').map(r=>{const a=r.split('|');return `<tr><td>${a[0]}</td><td>${a[1]}</td><td>${a[2]}</td></tr>`}).join('')}</tbody></table></div>`}
function formulasPage(){view.innerHTML=`<section class='card section'><p class='label'>Formula kartice</p><h2>Svaka formula ima značenje, jedinice i vježbu.</h2><p class='muted'>Prvo običnim jezikom, zatim formula, oznake, primjer i mini-zadatak.</p></section>${formulas.map(f=>`<article class='card section stack'><p class='label'>${f[1]}</p><h2>${f[2]}</h2><div class='chip'>${f[3]}</div><p>${f[4]}</p>${unitRows(f[6])}<div class='example'><b>Primjer</b><ol><li>Zapiši zadano.</li><li>Odaberi formulu: ${f[3]}</li><li>Uvrsti brojeve i napiši jedinicu.</li></ol></div><p class='note'>Slika za pamćenje: ${f[5]}</p><details><summary><b>Tipične greške</b></summary><ul><li>Pazi na pretvorbu jedinica.</li><li>Ne preskači mjernu jedinicu odgovora.</li></ul></details><details><summary><b>Mini-zadatak</b></summary><p>Objasni svojim riječima kada koristiš formulu ${f[3]}.</p></details><div class='confidence'><button class='${confidence[f[0]]==='unknown'?'active':''}' data-conf='unknown' data-id='${f[0]}'>Ne znam</button><button class='${confidence[f[0]]==='partial'?'active':''}' data-conf='partial' data-id='${f[0]}'>Djelomično znam</button><button class='${confidence[f[0]]==='known'?'active':''}' data-conf='known' data-id='${f[0]}'>Znam dobro</button></div></article>`).join('')}`}
function labs(){view.innerHTML=`<section class='card section'><p class='label'>Interaktivni laboratoriji</p><h2>Promijeni vrijednosti i odmah vidi što se događa.</h2><p class='muted'>Klizači prikazuju rezultat s mjernom jedinicom.</p></section><div class='tabs'>${[['rad','Rad'],['snaga','Snaga'],['kin','Kinetička'],['grav','Visina'],['elas','Opruga'],['top','Toplina'],['unut','Čestice'],['rast','Tekućina']].map(x=>`<button class='${lab===x[0]?'active':''}' data-lab='${x[0]}'>${x[1]}</button>`).join('')}</div><section class='card section'>${labView()}</section>`;bindLab()}
function slider(id,label,min,max,val,unit,step=1){return `<label class='slider'><span>${label}<b id='${id}Label'>${val} ${unit}</b></span><input id='${id}' type='range' min='${min}' max='${max}' step='${step}' value='${val}' data-unit='${unit}'></label>`}
function labView(){const titles={rad:'Laboratorij rada',snaga:'Laboratorij snage',kin:'Kinetička energija',grav:'Energija visine',elas:'Elastična energija',top:'Toplina',unut:'Unutarnja energija',rast:'Rastezanje tekućina'};const forms={rad:'W = F · s',snaga:'P = W / t',kin:'Ek = m · v² / 2',grav:'Ep = m · g · h',elas:'Eel = k · x² / 2',top:'Q = m · c · ΔT',unut:'U',rast:'ΔV = V₀ · β · ΔT'};const controls={rad:slider('a','Sila F',0,100,35,'N')+slider('b','Put s',0,20,8,'m'),snaga:slider('a','Rad W',0,1000,400,'J',10)+slider('b','Vrijeme t',1,60,20,'s'),kin:slider('a','Masa m',.1,100,8,'kg',.1)+slider('b','Brzina v',0,50,12,'m/s'),grav:slider('a','Masa m',.1,50,5,'kg',.1)+slider('b','Visina h',0,20,6,'m',.5),elas:slider('a','k',1,1000,160,'N/m')+slider('b','x',0,1,.25,'m',.01),top:slider('a','Masa m',.1,10,1,'kg',.1)+`<label class='field'>Tvar<select id='c'><option value='4200'>voda 4200</option><option value='450'>željezo 450</option><option value='900'>aluminij 900</option><option value='380'>bakar 380</option></select></label>`+slider('b','T₁',-20,120,20,'°C')+slider('d','T₂',-20,120,80,'°C'),unut:`<div class='tabs'><button data-temp='niska'>niska</button><button data-temp='srednja'>srednja</button><button data-temp='visoka'>visoka</button></div>`,rast:slider('a','V₀',.1,10,1,'L',.1)+slider('b','β',.0001,.003,.001,'1/°C',.0001)+slider('d','T₂',-20,120,60,'°C')};const vis=lab==='kin'?`<span class='labBall'></span>`:lab==='top'?`<span class='thermoBig'><span id='liq'></span></span>`:lab==='rast'?`<span class='thermoBig'><span id='liq'></span></span>`:lab==='elas'?`<span class='springLine' id='spring'></span>`:lab==='unut'?Array.from({length:18},(_,i)=>`<span class='particle' style='--i:${i}'></span>`).join(''):`<span class='labArrow' id='labArrow'></span><span class='labBox' id='labBox'></span>`;return `<div class='labPage'><div class='stack'><p class='label'>${forms[lab]}</p><h2>${titles[lab]}</h2>${controls[lab]}<div class='resultBox' style='min-height:100px'><span>Rezultat</span><b id='out'></b></div><p class='muted'>Promijeni vrijednosti i promatraj rezultat.</p></div><div class='labVisual'>${vis}</div></div>`}
function bindLab(){view.querySelectorAll('input,select').forEach(e=>e.addEventListener('input',calcLab));view.querySelectorAll('[data-temp]').forEach(b=>b.addEventListener('click',()=>{temp=b.dataset.temp;calcLab()}));calcLab()}
function val(id){return Number(document.querySelector(id)?.value||0)}function label(id){const e=document.querySelector(id),l=document.querySelector(id+'Label');if(e&&l)l.textContent=e.value+' '+e.dataset.unit}function calcLab(){['#a','#b','#d'].forEach(label);const out=document.querySelector('#out');if(!out)return;if(lab==='rad'){out.textContent=(val('#a')*val('#b')).toFixed(0)+' J';labArrow.style.width=(20+val('#a')*.55)+'%';labBox.style.transform='translateX('+(val('#b')*3)+'px)'}else if(lab==='snaga')out.textContent=(val('#a')/val('#b')).toFixed(1)+' W';else if(lab==='kin')out.textContent=(val('#a')*val('#b')**2/2).toFixed(1)+' J';else if(lab==='grav')out.textContent=(val('#a')*10*val('#b')).toFixed(1)+' J';else if(lab==='elas'){out.textContent=(val('#a')*val('#b')**2/2).toFixed(2)+' J';spring.style.width=(30+val('#b')*55)+'%'}else if(lab==='top'){const dt=val('#d')-val('#b'),q=val('#a')*Number(c.value)*dt;out.textContent=`ΔT = ${dt} °C, Q = ${q.toFixed(0)} J`;liq.style.height=Math.max(10,Math.min(90,(val('#d')+20)/140*100))+'%'}else if(lab==='rast'){const dt=val('#d')-20,dv=val('#a')*val('#b')*dt;out.textContent=`ΔV = ${dv.toFixed(3)} L, V = ${(val('#a')+dv).toFixed(3)} L`;liq.style.height=Math.max(12,Math.min(90,32+dt))+'%'}else out.textContent=temp==='visoka'?'čestice se brzo gibaju':temp==='niska'?'čestice se sporo gibaju':'čestice se srednje brzo gibaju'}
function quiz(){const item=questions[q%questions.length];view.innerHTML=`<section class='card section'><p class='label'>Kviz</p><h2>Provjeri znanje u tri razine.</h2><p class='muted'>Kod greške dobivaš objašnjenje.</p></section><section class='card section'><p class='label'>Pitanje ${q%questions.length+1}/${questions.length}</p><h2>${item[0]}</h2><div class='answers'>${item[1].map((a,i)=>`<button class='${pick===null?'':i===item[2]?'correct':i===pick?'wrong':''}' data-answer='${i}'>${a}</button>`).join('')}</div>${pick!==null?`<p class='note'>${item[3]}</p><button class='primary' data-next-question>Sljedeće pitanje</button>`:''}<p class='muted'>Najbolji rezultat: ${best}</p></section>`}
function progress(){view.innerHTML=`<section class='card section'><p class='label'>Moj napredak</p><h2>${demoProgress()}% formula označeno kao sigurno</h2><div class='progressRow'><div class='ring' style='--p:${demoProgress()}%'><span>${demoProgress()}%</span></div><div class='stats'><div><span class='statIcon check'>✓</span><b>${realKnown()||8}</b><small>znam dobro</small></div><div><span class='statIcon star'>★</span><b>3</b><small>u tijeku</small></div><div><span class='statIcon book'>▰</span><b>2</b><small>lekcije</small></div><div><span class='statIcon clock'>♧</span><b>${best}</b><small>kviz</small></div></div></div><div class='stack' style='margin-top:1rem'>${formulas.map(f=>`<button class='quick' data-page='formulas'><span>${f[2]}</span><b>${confidence[f[0]]==='known'?'Znam dobro':confidence[f[0]]==='partial'?'Djelomično znam':'Ne znam'}</b><span>›</span></button>`).join('')}</div><button class='secondary' style='margin-top:1rem' data-reset>Resetiraj lokalni napredak</button></section>`}
function conversionHtml(){return conversions.map(c=>`<article><b style='color:var(--teal)'>${c[0]} → ${c[1]}</b><p>${c[2]}</p><small class='muted'>${c[3]}</small></article>`).join('')}function openConverter(){conv.innerHTML=conversionHtml();shade.classList.remove('hidden')}function closeConverter(){shade.classList.add('hidden')}
document.addEventListener('click',e=>{const p=e.target.closest('[data-page]');if(p)go(p.dataset.page);const l=e.target.closest('[data-lab]');if(l){lab=l.dataset.lab;labs()}const c=e.target.closest('[data-conf]');if(c){confidence[c.dataset.id]=c.dataset.conf;save();formulasPage()}const a=e.target.closest('[data-answer]');if(a){pick=Number(a.dataset.answer);if(pick===questions[q%questions.length][2])best++;save();quiz()}if(e.target.closest('[data-next-question]')){q++;pick=null;quiz()}if(e.target.closest('[data-action="converter"]'))openConverter();if(e.target.closest('[data-action="close"]'))closeConverter();if(e.target.closest('[data-reset]')){confidence={};best=0;save();progress()}});shade.addEventListener('click',e=>{if(e.target===shade)closeConverter()});
function render(){renderNav();({home,formulas:formulasPage,labs,quiz,progress})[page]()}render();
</script>
</body>
</html>

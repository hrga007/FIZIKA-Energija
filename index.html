<!doctype html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fizika radionica</title>
  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #f6f8f4;
      --card: #ffffff;
      --ink: #10201d;
      --muted: #64716e;
      --line: #dce6df;
      --teal: #12847e;
      --green: #428f52;
      --coral: #dc614f;
      --amber: #d99222;
      --blue: #317db4;
      --violet: #675db7;
      --soft-teal: #e7f6f3;
      --soft-green: #e9f6e5;
      --soft-coral: #ffe8e3;
      --soft-blue: #e9f4ff;
      --radius: 8px;
      color-scheme: light;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      background: linear-gradient(180deg, #fbfcfa 0%, var(--bg) 100%);
      color: var(--ink);
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    h1, h2, h3, p { margin-top: 0; }

    .app { min-height: 100vh; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 0.7rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(16px);
    }
    .topbar-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      min-width: 0;
    }
    .topbar h1 { margin: 0; font-size: 1.2rem; line-height: 1; }
    .icon-button {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      font-weight: 900;
    }
    .atom-logo {
      position: relative;
      width: 38px;
      height: 38px;
      color: var(--teal);
    }
    .atom-logo::before, .atom-logo::after, .atom-logo span {
      position: absolute;
      inset: 9px 2px;
      border: 2px solid currentColor;
      border-radius: 50%;
      content: "";
    }
    .atom-logo::before { transform: rotate(58deg); }
    .atom-logo::after { transform: rotate(-58deg); }
    .atom-logo span { transform: rotate(0deg); }
    .atom-logo i {
      position: absolute;
      left: 50%; top: 50%;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--amber);
      transform: translate(-50%, -50%);
    }
    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 36%, #ffe2bd 0 21%, transparent 22%), linear-gradient(#b8eef0, #dff8f3);
      border: 1px solid var(--line);
    }

    .sidebar { display: none; }
    .main { width: min(100%, 1120px); margin: 0 auto; padding: 1rem 1rem 6.7rem; }
    .stack { display: grid; gap: 1rem; }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: 0 14px 35px rgba(16, 32, 29, 0.08);
    }
    .section { padding: 1rem; }
    .label {
      margin: 0 0 0.35rem;
      color: var(--teal);
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    .muted { color: var(--muted); line-height: 1.5; }
    .section h2 { margin-bottom: 0.45rem; font-size: clamp(1.45rem, 6vw, 2.2rem); line-height: 1.08; }

    .topic-strip {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(142px, 1fr);
      gap: 0.75rem;
      overflow-x: auto;
      padding: 0.2rem 0.05rem 0.45rem;
      scroll-snap-type: x mandatory;
    }
    .topic-card {
      display: grid;
      gap: 0.45rem;
      min-height: 112px;
      place-items: center;
      padding: 0.8rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      font-size: 1.14rem;
      font-weight: 900;
      scroll-snap-align: start;
      text-align: center;
    }
    .topic-card.active { border-color: var(--teal); color: var(--teal); box-shadow: inset 0 -4px 0 var(--teal); }
    .topic-card.energy { color: var(--green); }
    .topic-card.heat { color: var(--coral); }
    .topic-card.lab { color: var(--violet); }

    .mini { position: relative; width: 64px; height: 42px; }
    .mini.push::before { position: absolute; left: 4px; bottom: 8px; width: 14px; height: 14px; border-radius: 50%; background: var(--amber); content: ""; }
    .mini.push::after { position: absolute; right: 5px; bottom: 5px; width: 30px; height: 28px; border: 2px solid #8b5a24; border-radius: 5px; background: #e7b66d; content: ""; }
    .mini.push span { position: absolute; left: 19px; right: 35px; top: 22px; height: 4px; border-radius: 999px; background: var(--coral); }
    .mini.ball::before { position: absolute; left: 15px; top: 4px; width: 34px; height: 34px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff 0 15%, #f2c24e 16% 100%); box-shadow: inset 0 0 0 2px rgba(0,0,0,.08); content: ""; }
    .mini.thermo::before { position: absolute; left: 25px; top: 2px; width: 14px; height: 34px; border: 2px solid var(--coral); border-radius: 999px; content: ""; }
    .mini.thermo::after { position: absolute; left: 29px; bottom: 8px; width: 6px; height: 24px; border-radius: 999px; background: var(--coral); content: ""; }
    .mini.flask::before { position: absolute; left: 22px; top: 4px; width: 18px; height: 30px; border: 3px solid currentColor; border-top-width: 0; transform: skew(-10deg); border-radius: 3px 3px 12px 12px; content: ""; }
    .mini.flask::after { position: absolute; left: 27px; top: 0; width: 9px; height: 10px; border-inline: 3px solid currentColor; content: ""; }

    .progress-card { position: relative; padding: 1.1rem; }
    .arrow-link { position: absolute; right: 0.9rem; top: 0.9rem; border: 0; background: transparent; color: var(--ink); font-size: 2rem; line-height: 1; }
    .progress-layout { display: grid; grid-template-columns: 96px 1fr; gap: 1rem; align-items: center; margin-top: 1rem; }
    .ring { display: grid; width: 92px; height: 92px; place-items: center; border-radius: 50%; background: conic-gradient(var(--teal) var(--progress), #e8eeee 0); }
    .ring span { display: grid; width: 70px; height: 70px; place-items: center; border-radius: 50%; background: #fff; font-size: 1.55rem; font-weight: 900; }
    .progress-stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.65rem; text-align: center; }
    .progress-stats b { display: block; margin-top: 0.25rem; font-size: 1.25rem; }
    .progress-stats small { color: var(--muted); }
    .stat-icon { display: grid; width: 36px; height: 36px; place-items: center; margin: 0 auto; border-radius: 50%; background: var(--soft-teal); color: var(--teal); font-weight: 900; }
    .stat-icon.green { background: var(--soft-green); color: var(--green); }
    .stat-icon.coral { background: var(--soft-coral); color: var(--coral); }

    .mind-card { padding: 1rem; background: linear-gradient(180deg, #fff 0%, #f2fbf9 100%); }
    .mind-map {
      position: relative;
      min-height: 310px;
      margin-top: 0.8rem;
      overflow: hidden;
      border: 1px solid #b9dfdc;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #f8ffff, #eefaf6);
    }
    .branch-line { position: absolute; left: 50%; top: 48%; width: 78%; height: 2px; background: linear-gradient(90deg, var(--teal), var(--green), var(--coral), var(--blue)); transform: translate(-50%, -50%); }
    .branch-line.vertical { width: 2px; height: 78%; }
    .map-center { position: absolute; left: 50%; top: 48%; width: 138px; min-height: 64px; display: grid; place-items: center; padding: 0.6rem; border-radius: var(--radius); background: var(--teal); color: #fff; font-weight: 900; text-align: center; transform: translate(-50%, -50%); box-shadow: 0 18px 25px rgba(18,132,126,.22); }
    .map-node { position: absolute; display: grid; min-width: 92px; min-height: 48px; place-items: center; padding: 0.55rem; border: 2px solid currentColor; border-radius: var(--radius); background: #fff; font-weight: 900; text-align: center; }
    .map-node.rad { left: 10%; top: 25%; color: var(--teal); }
    .map-node.energija { right: 9%; top: 25%; color: var(--green); }
    .map-node.toplina { left: 10%; bottom: 17%; color: var(--coral); }
    .map-node.snaga { right: 9%; bottom: 17%; color: var(--blue); }

    .formula-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .formula-tile { display: grid; gap: 0.45rem; min-height: 128px; align-content: center; padding: 0.9rem; border: 1px solid #b9dfdc; border-radius: var(--radius); background: var(--soft-teal); text-align: center; }
    .formula-tile.heat { border-color: #f0b7ad; background: #fff3ef; }
    .formula-tile strong { font-family: Georgia, "Times New Roman", serif; color: var(--teal); font-size: clamp(1.6rem, 8vw, 2.45rem); line-height: 1; }
    .formula-tile.heat strong { color: #b65022; }
    .formula-tile span, .formula-tile small { color: var(--muted); }

    .lab-preview { display: grid; gap: 1rem; }
    .lab-scene { position: relative; min-height: 125px; border-radius: var(--radius); background: linear-gradient(180deg, transparent 70%, #d9e2de 70% 72%, transparent 72%), #f7fbf9; overflow: hidden; }
    .person { position: absolute; left: 8%; bottom: 38px; width: 22px; height: 22px; border-radius: 50%; background: var(--amber); }
    .push-arrow { position: absolute; left: 22%; right: 28%; bottom: 48px; height: 5px; border-radius: 999px; background: var(--coral); }
    .push-arrow::after { position: absolute; right: -8px; top: -6px; border-block: 8px solid transparent; border-left: 10px solid var(--coral); content: ""; }
    .crate { position: absolute; right: 10%; bottom: 30px; width: 52px; height: 46px; border: 3px solid #8b5a24; border-radius: var(--radius); background: #e7b66d; transition: transform .2s ease; }
    .lab-controls { display: grid; gap: 0.75rem; }
    .slider { display: grid; gap: 0.35rem; color: var(--muted); font-weight: 800; }
    .slider span { display: flex; justify-content: space-between; gap: 1rem; }
    .slider b { color: var(--ink); }
    input[type="range"] { width: 100%; accent-color: var(--teal); }
    .result-box { display: grid; gap: 0.2rem; padding: 0.9rem; border-radius: var(--radius); background: var(--ink); color: #fff; }
    .result-box b { font-size: 2.2rem; }

    .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .quick-card { display: grid; grid-template-columns: auto 1fr auto; gap: 0.75rem; align-items: center; min-height: 86px; padding: 1rem; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--ink); text-align: left; }
    .quick-card small { display: block; margin-top: 0.2rem; color: var(--muted); line-height: 1.25; }
    .quick-symbol { display: grid; width: 42px; height: 42px; place-items: center; border-radius: var(--radius); background: var(--soft-blue); color: var(--blue); font-size: 1.5rem; }

    .tabs { display: flex; gap: 0.35rem; overflow-x: auto; padding: 0.35rem; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; }
    .tabs button { flex: 0 0 auto; min-height: 2.45rem; padding: 0.3rem 0.75rem; border: 0; border-radius: 6px; background: transparent; color: var(--muted); font-weight: 900; }
    .tabs button.active { background: var(--ink); color: #fff; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; min-width: 520px; border-collapse: collapse; }
    td, th { padding: 0.7rem; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 0.76rem; text-transform: uppercase; }
    .chip { display: inline-flex; padding: 0.6rem 0.75rem; border-radius: var(--radius); background: var(--soft-teal); color: var(--teal); font-family: Consolas, monospace; font-weight: 900; }
    .note, .example { padding: 0.8rem; border-radius: var(--radius); background: #f3f7f5; }
    .example { background: var(--soft-teal); }
    .confidence { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.45rem; }
    .confidence button, .primary, .secondary { display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem; min-height: 2.55rem; padding: 0.65rem 0.8rem; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--ink); font-weight: 900; }
    .confidence button.active, .primary { border-color: var(--teal); background: var(--teal); color: #fff; }
    .field { display: grid; gap: 0.35rem; color: var(--muted); font-weight: 800; }
    .field input, .field select { min-height: 2.7rem; border: 1px solid var(--line); border-radius: var(--radius); padding: 0.5rem; background: #fff; color: var(--ink); }
    .answers { display: grid; gap: 0.6rem; }
    .answers button { min-height: 3rem; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--ink); padding: 0.75rem; text-align: left; font-weight: 900; }
    .answers button.correct { border-color: var(--green); background: var(--soft-green); }
    .answers button.wrong { border-color: var(--coral); background: var(--soft-coral); }

    .converter-button { position: fixed; right: 1rem; bottom: 4.9rem; z-index: 30; border: 0; border-radius: var(--radius); background: var(--ink); color: #fff; box-shadow: 0 14px 28px rgba(16,32,29,.18); padding: 0.75rem 0.9rem; font-weight: 900; }
    .shade { position: fixed; inset: 0; z-index: 40; display: grid; align-items: end; background: rgba(16,32,29,.42); }
    .drawer { max-height: 82vh; overflow: auto; padding: 1rem; border-radius: 14px 14px 0 0; background: #fff; }
    .hidden { display: none !important; }
    .conversion-list { display: grid; gap: 0.65rem; }
    .conversion-list article { padding: 0.8rem; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; }
    .bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 25; display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid var(--line); background: rgba(255,255,255,.95); backdrop-filter: blur(16px); }
    .bottom-nav button { display: grid; gap: 0.18rem; min-width: 0; min-height: 4.1rem; place-items: center; border: 0; background: transparent; color: var(--muted); font-size: 0.68rem; font-weight: 800; }
    .bottom-nav button.active { color: var(--teal); }
    .bottom-nav span:last-child { max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    @media (min-width: 760px) {
      .app { display: grid; grid-template-columns: 17.5rem 1fr; }
      .topbar, .bottom-nav { display: none; }
      .sidebar { position: sticky; top: 0; display: block; height: 100vh; padding: 1rem; border-right: 1px solid var(--line); background: rgba(255,255,255,.82); }
      .brand { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; }
      .brand-mark { display: grid; width: 2.8rem; height: 2.8rem; place-items: center; border-radius: var(--radius); background: var(--ink); color: #fff; font-weight: 900; }
      .side-nav { display: grid; gap: 0.35rem; }
      .side-nav button { display: flex; align-items: center; gap: 0.65rem; width: 100%; min-height: 2.75rem; padding: 0 0.75rem; border: 0; border-radius: var(--radius); background: transparent; color: var(--muted); font-weight: 900; text-align: left; }
      .side-nav button.active { background: var(--ink); color: #fff; }
      .main { padding: 1.5rem 1.5rem 4rem; }
      .topic-strip { grid-auto-flow: column; grid-auto-columns: 1fr; overflow: visible; }
      .lab-preview, .lab-page-grid, .solver-grid { grid-template-columns: 1fr 1fr; }
      .converter-button { bottom: 1rem; }
      .shade { place-items: center; }
      .drawer { width: min(680px, calc(100vw - 2rem)); border-radius: var(--radius); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark">F</div><div><b>Fizika radionica</b><br><small class="muted">Rad, energija, toplina</small></div></div>
      <nav class="side-nav" id="sideNav"></nav>
    </aside>
    <div>
      <header class="topbar">
        <button class="icon-button" type="button" aria-label="Izbornik">☰</button>
        <div class="topbar-title"><div class="atom-logo"><span></span><i></i></div><h1>Fizika radionica</h1></div>
        <div class="avatar" aria-hidden="true"></div>
      </header>
      <main class="main"><div id="view" class="stack"></div></main>
      <nav class="bottom-nav" id="bottomNav"></nav>
      <button class="converter-button" type="button" onclick="openConverter()">⌁ Pretvorbe jedinica</button>
    </div>
  </div>

  <div class="shade hidden" id="converterShade" onclick="closeConverter()">
    <section class="drawer" onclick="event.stopPropagation()">
      <button class="icon-button" style="float:right" type="button" onclick="closeConverter()">×</button>
      <p class="label">Pomoćni panel</p>
      <h2>Pretvorbe jedinica</h2>
      <div class="conversion-list" id="converterList"></div>
    </section>
  </div>

  <script>
    const $ = (selector) => document.querySelector(selector);
    const view = $('#view');
    const nav = [
      ['home', '⌂', 'Početna'], ['map', '⌗', 'Mapa'], ['formulas', '▤', 'Formule'], ['labs', '⚗', 'Laboratoriji'],
      ['solver', '☷', 'Rješavač'], ['quiz', '♧', 'Kviz'], ['cheat', '☑', 'Šalabahter'], ['progress', '♕', 'Napredak']
    ];
    const formulas = [
      { id:'rad', group:'Mehanika', title:'Rad', formula:'W = F · s', meaning:'Rad nastaje kada sila pomiče tijelo na nekom putu.', memory:'Guram kutiju i ona se pomakne.', units:[['W ili A','rad','J'],['F','sila','N'],['s','put','m']] },
      { id:'snaga', group:'Mehanika', title:'Snaga', formula:'P = W / t', meaning:'Snaga pokazuje koliko brzo se obavlja rad ili prenosi energija.', memory:'Tko isti posao napravi brže, snažniji je.', units:[['P','snaga','W'],['W','rad','J'],['t','vrijeme','s']] },
      { id:'kin', group:'Energija', title:'Kinetička energija', formula:'Ek = m · v² / 2', meaning:'Kinetička energija je energija gibanja.', memory:'Autić koji se brzo giba.', units:[['Ek','kinetička energija','J'],['m','masa','kg'],['v','brzina','m/s']] },
      { id:'grav', group:'Energija', title:'Gravitacijska potencijalna', formula:'Ep = m · g · h', meaning:'Energija koju tijelo ima zbog visine. Ako je zadana težina: Ep = G · h.', memory:'Knjiga na polici.', units:[['Ep','energija visine','J'],['m','masa','kg'],['g','ubrzanje','N/kg'],['h','visina','m'],['G','težina','N']] },
      { id:'elas', group:'Energija', title:'Elastična potencijalna', formula:'Eel = k · x² / 2', meaning:'Energija pohranjena u rastegnutoj ili stisnutoj opruzi.', memory:'Rastegnuta gumica.', units:[['Eel','elastična energija','J'],['k','konstanta opruge','N/m'],['x','produljenje','m']] },
      { id:'pot', group:'Energija', title:'Potencijalna energija', formula:'položaj ili napetost', meaning:'Pohranjena energija zbog položaja ili deformacije.', memory:'Nešto je spremno napraviti promjenu.', units:[['Ep','gravitacijska','J'],['Eel','elastična','J']] },
      { id:'unut', group:'Struktura tvari', title:'Unutarnja energija', formula:'U', meaning:'Ukupna energija svih čestica u tijelu. Temperatura opisuje prosječnu brzinu čestica.', memory:'Čestice se brže gibaju kad je toplije.', units:[['U','unutarnja energija','J']] },
      { id:'top', group:'Toplina', title:'Toplina', formula:'Q = m · c · ΔT', meaning:'Toplina je energija koja prelazi s toplijeg tijela na hladnije.', memory:'Lonac vode koji se zagrijava.', units:[['Q','toplina','J'],['m','masa','kg'],['c','specifični toplinski kapacitet','J/kg°C'],['ΔT','promjena temperature','°C ili K']] },
      { id:'rast', group:'Toplina', title:'Toplinsko rastezanje tekućina', formula:'ΔV = V₀ · β · ΔT', meaning:'Zagrijana tekućina se širi jer čestice zauzimaju više prostora. Konačno: V = V₀ + ΔV.', memory:'Tekućina u termometru raste.', units:[['ΔV','promjena volumena','m³ ili L'],['V₀','početni volumen','m³ ili L'],['β','koeficijent širenja','1/°C'],['ΔT','promjena temperature','°C']] }
    ];
    const conversions = [['cm','m','80 cm = 0,8 m','podijeli sa 100'],['m','cm','1 m = 100 cm','pomnoži sa 100'],['g','kg','500 g = 0,5 kg','podijeli sa 1000'],['kg','g','1 kg = 1000 g','pomnoži sa 1000'],['min','s','2 min = 120 s','pomnoži sa 60'],['kJ','J','1 kJ = 1000 J','pomnoži sa 1000'],['J','kJ','1000 J = 1 kJ','podijeli sa 1000']];
    const questions = [
      ['Koja formula se koristi za rad?', ['W = F · s','P = W / t','Q = m · c · ΔT'], 0, 'Rad = sila · put.'],
      ['Koja je jedinica za snagu?', ['W','J','N'], 0, 'Snaga se mjeri u vatima, W.'],
      ['Sila je 20 N, put 5 m. Koliki je rad?', ['100 J','4 J','25 W'], 0, 'W = 20 · 5 = 100 J.'],
      ['Masa 2 kg, brzina 4 m/s. Kolika je Ek?', ['16 J','8 J','32 J'], 0, 'Ek = 2 · 4² / 2 = 16 J.'],
      ['Voda: m = 1 kg, c = 4200, ΔT = 5 °C. Koliko je Q?', ['21000 J','4205 J','840 J'], 0, 'Q = 1 · 4200 · 5 = 21000 J.']
    ];

    let page = 'home';
    let lab = 'rad';
    let questionIndex = 0;
    let picked = null;
    let temp = 'srednja';
    let confidence = JSON.parse(localStorage.fizikaConfidence || '{}');
    let best = Number(localStorage.fizikaBest || 0);

    function save() { localStorage.fizikaConfidence = JSON.stringify(confidence); localStorage.fizikaBest = String(best); }
    function knownCount() { return formulas.filter((item) => confidence[item.id] === 'known').length; }
    function progressPercent() { return Math.round((knownCount() / formulas.length) * 100); }
    function setPage(next) { page = next; picked = null; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    function renderNav() {
      sideNav.innerHTML = nav.map((item) => `<button class="${page === item[0] ? 'active' : ''}" onclick="setPage('${item[0]}')"><span>${item[1]}</span><span>${item[2]}</span></button>`).join('');
      bottomNav.innerHTML = nav.slice(0, 5).map((item) => `<button class="${page === item[0] ? 'active' : ''}" onclick="setPage('${item[0]}')"><span>${item[1]}</span><span>${item[2]}</span></button>`).join('');
    }
    function render() { renderNav(); ({ home, map, formulasPage, labs, solver, quiz, cheat, progress })[page](); }

    function topicCard(cls, label, icon, target) {
      return `<button class="topic-card ${cls}" onclick="setPage('${target}')"><span class="mini ${icon}"><span></span></span><strong>${label}</strong></button>`;
    }
    function mindMap() {
      return `<div class="mind-map"><div class="branch-line"></div><div class="branch-line vertical"></div><button class="map-node rad" onclick="setPage('formulas')">Rad</button><button class="map-node energija" onclick="setPage('formulas')">Energija</button><button class="map-node toplina" onclick="setPage('labs')">Toplina</button><button class="map-node snaga" onclick="setPage('formulas')">Snaga</button><div class="map-center">Rad, energija, snaga i toplina</div></div>`;
    }
    function home() {
      const percent = progressPercent();
      view.innerHTML = `
        <section class="stack">
          <div class="topic-strip">
            ${topicCard('active', 'Rad', 'push', 'formulas')}
            ${topicCard('energy', 'Energija', 'ball', 'labs')}
            ${topicCard('heat', 'Toplina', 'thermo', 'labs')}
            ${topicCard('lab', 'Laboratorij', 'flask', 'labs')}
          </div>
          <article class="card progress-card">
            <button class="arrow-link" onclick="setPage('progress')" aria-label="Otvori napredak">›</button>
            <p class="label">Moj napredak</p><h2>${percent}% ukupno</h2><p class="muted">${knownCount()}/${formulas.length} formula označeno kao “znam dobro”.</p>
            <div class="progress-layout"><div class="ring" style="--progress:${percent}%"><span>${percent}%</span></div><div class="progress-stats"><div><span class="stat-icon green">✓</span><b>${knownCount()}</b><small>završeno</small></div><div><span class="stat-icon">★</span><b>${formulas.length - knownCount()}</b><small>u tijeku</small></div><div><span class="stat-icon coral">▣</span><b>9</b><small>lekcije</small></div></div></div>
          </article>
          <article class="card mind-card"><p class="label">Mapa pojmova</p><h2>Dodirni čvor za istraživanje</h2>${mindMap()}</article>
          <article class="card section"><div class="section-heading"><p class="label">Važne formule</p><h2>Brzi pogled</h2></div><div class="formula-grid"><button class="formula-tile" onclick="setPage('formulas')"><strong>W = F · s</strong><span>Rad = sila · put</span><small>džul, J</small></button><button class="formula-tile heat" onclick="setPage('formulas')"><strong>Q = m · c · ΔT</strong><span>Toplina zagrijavanja</span><small>džul, J</small></button></div></article>
          <article class="card section"><p class="label">Laboratorij: Rad</p><h2>Promijeni silu ili put.</h2>${workPreview()}</article>
          <div class="quick-grid"><button class="quick-card" onclick="setPage('quiz')"><span class="quick-symbol">☑</span><span><b>Kviz</b><small>Provjeri svoje znanje</small></span><b>›</b></button><button class="quick-card" onclick="openConverter()"><span class="quick-symbol">⌁</span><span><b>Pretvorbe jedinica</b><small>Uvijek dostupno</small></span><b>›</b></button></div>
        </section>`;
      setTimeout(calculateHomeWork);
    }
    function workPreview() {
      return `<div class="lab-preview"><div class="lab-scene"><span class="person"></span><span class="push-arrow"></span><span class="crate" id="homeCrate"></span></div><div class="lab-controls"><label class="slider"><span>Sila F <b id="homeForceLabel">20 N</b></span><input id="homeForce" type="range" min="0" max="100" value="20" oninput="calculateHomeWork()"></label><label class="slider"><span>Put s <b id="homeDistanceLabel">3 m</b></span><input id="homeDistance" type="range" min="0" max="5" value="3" oninput="calculateHomeWork()"></label><button class="result-box" onclick="setPage('labs')"><span>Rad W</span><b id="homeWork">60 J</b><small>W = F · s</small></button></div></div>`;
    }
    function calculateHomeWork() {
      if (!$('#homeForce')) return;
      const force = Number(homeForce.value), distance = Number(homeDistance.value);
      homeForceLabel.textContent = `${force} N`; homeDistanceLabel.textContent = `${distance} m`; homeWork.textContent = `${force * distance} J`; homeCrate.style.transform = `translateX(${distance * 10}px)`;
    }

    function map() { view.innerHTML = `<section class="card section"><p class="label">Početna mentalna mapa</p><h2>Fizika: rad, energija, snaga i toplina</h2><p class="muted">Klikni pojam i odmah vidi značenje, formulu, jedinicu rezultata i primjer iz života.</p>${mindMap()}</section><section class="stack">${formulas.map((item) => `<article class="card section"><p class="label">${item.group}</p><h2>${item.title}</h2><div class="chip">${item.formula}</div><p class="muted">${item.meaning}</p><p>${item.memory}</p><button class="primary" onclick="setPage('labs')">Vježbaj ovo →</button></article>`).join('')}</section>`; }
    function unitTable(item) { return `<div class="table-wrap"><table><thead><tr><th>Oznaka</th><th>Značenje</th><th>Jedinica</th></tr></thead><tbody>${item.units.map((unit) => `<tr><td>${unit[0]}</td><td>${unit[1]}</td><td>${unit[2]}</td></tr>`).join('')}</tbody></table></div>`; }
    function formulasPage() {
      view.innerHTML = `<section class="card section"><p class="label">Formula kartice</p><h2>Svaka formula ima značenje, jedinice i vježbu.</h2><p class="muted">Prvo običnim jezikom, zatim formula, oznake, primjer i mini-zadatak.</p></section>${formulas.map((item) => `<article class="card section stack"><p class="label">${item.group}</p><h2>${item.title}</h2><div class="chip">${item.formula}</div><p>${item.meaning}</p>${unitTable(item)}<div class="example"><b>Primjer</b><ol><li>Zapiši zadano.</li><li>Odaberi formulu: ${item.formula}</li><li>Uvrsti brojeve i obavezno napiši jedinicu.</li></ol></div><p class="note">Slika za pamćenje: ${item.memory}</p><details><summary><b>Tipične greške</b></summary><ul><li>Pazi na pretvorbu jedinica.</li><li>Ne preskači oznake i mjernu jedinicu odgovora.</li></ul></details><details><summary><b>Mini-zadatak</b></summary><p>Objasni svojim riječima kada koristiš formulu ${item.formula}.</p></details><div class="confidence">${['unknown','partial','known'].map((state) => `<button class="${confidence[item.id] === state ? 'active' : ''}" onclick="confidence['${item.id}']='${state}'; save(); formulasPage();">${state === 'unknown' ? 'Ne znam' : state === 'partial' ? 'Djelomično znam' : 'Znam dobro'}</button>`).join('')}</div></article>`).join('')}<section class="card section"><p class="label">Flash kartice</p><h2>Mini-ponavljanje</h2><div class="stack">${formulas.map((item) => `<details class="note"><summary>Koja je formula za ${item.title}?</summary><b>${item.formula}</b><p>${item.meaning}</p></details>`).join('')}</div></section>`;
    }

    function labs() { view.innerHTML = `<section class="card section"><p class="label">Interaktivni laboratoriji</p><h2>Promijeni vrijednosti i odmah vidi što se događa.</h2><p class="muted">Klizači prikazuju rezultat s mjernom jedinicom.</p></section><div class="tabs">${[['rad','Rad'],['snaga','Snaga'],['kin','Kinetička'],['grav','Visina'],['elas','Opruga'],['top','Toplina'],['unut','Čestice'],['rast','Tekućina']].map((item) => `<button class="${lab === item[0] ? 'active' : ''}" onclick="lab='${item[0]}'; labs();">${item[1]}</button>`).join('')}</div><section class="card section">${labView()}</section>`; }
    function slider(id, label, min, max, value, unit, step = 1) { return `<label class="slider"><span>${label}<b id="${id}Label">${value} ${unit}</b></span><input id="${id}" type="range" min="${min}" max="${max}" step="${step}" value="${value}" data-unit="${unit}" oninput="calculateLab()"></label>`; }
    function labView() {
      setTimeout(calculateLab);
      const titles = { rad:'Laboratorij rada', snaga:'Laboratorij snage', kin:'Kinetička energija', grav:'Energija visine', elas:'Elastična energija', top:'Toplina', unut:'Unutarnja energija', rast:'Rastezanje tekućina' };
      const forms = { rad:'W = F · s', snaga:'P = W / t', kin:'Ek = m · v² / 2', grav:'Ep = m · g · h', elas:'Eel = k · x² / 2', top:'Q = m · c · ΔT', unut:'U', rast:'ΔV = V₀ · β · ΔT' };
      const controls = {
        rad: slider('a','Sila F',0,100,35,'N') + slider('b','Put s',0,20,8,'m'),
        snaga: slider('a','Rad W',0,1000,400,'J',10) + slider('b','Vrijeme t',1,60,20,'s'),
        kin: slider('a','Masa m',0.1,100,8,'kg',0.1) + slider('b','Brzina v',0,50,12,'m/s'),
        grav: slider('a','Masa m',0.1,50,5,'kg',0.1) + slider('b','Visina h',0,20,6,'m',0.5),
        elas: slider('a','k',1,1000,160,'N/m') + slider('b','x',0,1,0.25,'m',0.01),
        top: slider('a','Masa m',0.1,10,1,'kg',0.1) + `<label class="field">Tvar<select id="c" onchange="calculateLab()"><option value="4200">voda 4200</option><option value="450">željezo 450</option><option value="900">aluminij 900</option><option value="380">bakar 380</option></select></label>` + slider('b','T₁',-20,120,20,'°C') + slider('d','T₂',-20,120,80,'°C'),
        unut: `<div class="tabs"><button onclick="temp='niska'; calculateLab();">niska</button><button onclick="temp='srednja'; calculateLab();">srednja</button><button onclick="temp='visoka'; calculateLab();">visoka</button></div>`,
        rast: slider('a','V₀',0.1,10,1,'L',0.1) + slider('b','β',0.0001,0.003,0.001,'1/°C',0.0001) + slider('d','T₂',-20,120,60,'°C')
      };
      const visual = lab === 'kin' ? '<span class="mini ball" style="position:absolute;left:40%;top:35%;transform:scale(1.45)"></span>' : lab === 'top' ? '<span class="thermo-big"><span id="liq"></span></span>' : lab === 'rast' ? '<span class="thermo-big tube"><span id="liq"></span></span>' : lab === 'elas' ? '<span class="spring-line" id="spring"></span>' : lab === 'unut' ? Array.from({ length: 18 }, (_, index) => `<span class="particle" style="--i:${index}"></span>`).join('') : '<span class="person"></span><span class="push-arrow" id="labArrow"></span><span class="crate" id="labCrate"></span>';
      return `<div class="lab-preview lab-page-grid"><div class="stack"><p class="label">${forms[lab]}</p><h2>${titles[lab]}</h2>${controls[lab]}<div class="result-box"><span>Rezultat</span><b id="out"></b></div><p class="muted">Promijeni vrijednosti i promatraj rezultat.</p></div><div class="lab-scene">${visual}</div></div>`;
    }
    function value(id) { return Number($(id)?.value || 0); }
    function label(id) { const element = $(id), target = $(id + 'Label'); if (element && target) target.textContent = `${element.value} ${element.dataset.unit}`; }
    function calculateLab() {
      ['#a','#b','#d'].forEach(label);
      if (!$('#out')) return;
      if (lab === 'rad') { out.textContent = `${(value('#a') * value('#b')).toFixed(0)} J`; labArrow.style.width = `${20 + value('#a') * 0.55}%`; labCrate.style.transform = `translateX(${value('#b') * 3}px)`; }
      else if (lab === 'snaga') out.textContent = `${(value('#a') / value('#b')).toFixed(1)} W`;
      else if (lab === 'kin') out.textContent = `${(value('#a') * value('#b') ** 2 / 2).toFixed(1)} J`;
      else if (lab === 'grav') out.textContent = `${(value('#a') * 10 * value('#b')).toFixed(1)} J`;
      else if (lab === 'elas') { out.textContent = `${(value('#a') * value('#b') ** 2 / 2).toFixed(2)} J`; spring.style.width = `${30 + value('#b') * 55}%`; }
      else if (lab === 'top') { const delta = value('#d') - value('#b'), heat = value('#a') * Number(c.value) * delta; out.textContent = `ΔT = ${delta} °C, Q = ${heat.toFixed(0)} J`; liq.style.height = `${Math.max(10, Math.min(90, (value('#d') + 20) / 140 * 100))}%`; }
      else if (lab === 'rast') { const delta = value('#d') - 20, dv = value('#a') * value('#b') * delta; out.textContent = `ΔV = ${dv.toFixed(3)} L, V = ${(value('#a') + dv).toFixed(3)} L`; liq.style.height = `${Math.max(12, Math.min(90, 32 + delta))}%`; }
      else out.textContent = temp === 'visoka' ? 'čestice se brzo gibaju' : temp === 'niska' ? 'čestice se sporo gibaju' : 'čestice se srednje brzo gibaju';
    }

    function solver() { view.innerHTML = `<section class="card section"><p class="label">Rješavač zadataka</p><h2>Korak po korak od zadanog do odgovora.</h2></section><section class="card section solver-grid stack"><div class="stack"><label class="field">Vrsta<select id="kind" onchange="solveNow()"><option value="rad">Rad</option><option value="snaga">Snaga</option><option value="kin">Kinetička</option><option value="top">Toplina</option></select></label><label class="field">Broj 1<input id="x" type="number" value="20"></label><label class="field">Broj 2<input id="y" type="number" value="5"></label><label class="field">Broj 3<input id="z" type="number" value="10"></label><button class="primary" onclick="solveNow()">Riješi</button></div><div class="note"><h2>Rješenje</h2><ol id="steps"></ol></div></section><section class="card section"><p class="label">Testni zadatak</p><details><summary>Loptica težine 0,5 N pada s 1 m i odbija se na 80 cm.</summary><ol><li>80 cm = 0,8 m</li><li>E₁ = 0,5 · 1 = 0,5 J</li><li>E₂ = 0,5 · 0,8 = 0,4 J</li><li>Izgubljeno = 0,1 J</li></ol></details></section>`; solveNow(); }
    function solveNow() { const k = kind.value, x = Number($('#x').value), y = Number($('#y').value), z = Number($('#z').value); let list = []; if (k === 'rad') list = [`Zadano: F = ${x} N, s = ${y} m`, 'Traži se: rad W', 'Formula: W = F · s', 'Pretvorba: put mora biti u metrima', `W = ${x} · ${y} = ${x * y} J`, `Odgovor s jedinicom: ${x * y} J`, 'Značenje: veća sila ili put daju veći rad.']; if (k === 'snaga') list = [`Zadano: W = ${x} J, t = ${y} s`, 'Formula: P = W / t', `P = ${x} / ${y} = ${(x / y).toFixed(1)} W`, 'Kraće vrijeme znači veću snagu.']; if (k === 'kin') list = [`Zadano: m = ${x} kg, v = ${y} m/s`, 'Formula: Ek = m · v² / 2', `Ek = ${x} · ${y}² / 2 = ${(x * y * y / 2).toFixed(1)} J`, 'Brzina je na kvadrat.']; if (k === 'top') list = [`Zadano: m = ${x} kg, c = ${y}, ΔT = ${z} °C`, 'Formula: Q = m · c · ΔT', `Q = ${x} · ${y} · ${z} = ${(x * y * z).toFixed(0)} J`, 'Veći c traži više topline.']; steps.innerHTML = list.map((step) => `<li>${step}</li>`).join(''); }
    function quiz() { const item = questions[questionIndex % questions.length]; view.innerHTML = `<section class="card section"><p class="label">Kviz i provjera znanja</p><h2>Od formula do računanja.</h2><p class="muted">Kod greške dobivaš objašnjenje.</p></section><section class="card section"><p class="label">Pitanje ${questionIndex % questions.length + 1}/${questions.length}</p><h2>${item[0]}</h2><div class="answers">${item[1].map((answer, index) => `<button class="${picked === null ? '' : index === item[2] ? 'correct' : index === picked ? 'wrong' : ''}" onclick="choose(${index})">${answer}</button>`).join('')}</div>${picked !== null ? `<p class="note">${item[3]}</p><button class="primary" onclick="questionIndex++; picked=null; quiz();">Sljedeće pitanje</button>` : ''}<p class="muted">Najbolji rezultat: ${best}</p></section>`; }
    function choose(index) { picked = index; if (index === questions[questionIndex % questions.length][2]) best++; save(); quiz(); }
    function cheat() { view.innerHTML = `<section class="card section"><p class="label">Brzi šalabahter</p><h2>Sve formule na jednom mjestu.</h2></section><section class="card section table-wrap"><table><thead><tr><th>Pojam</th><th>Formula</th><th>Glavna ideja</th><th>Jedinica</th></tr></thead><tbody>${formulas.map((item) => `<tr><td>${item.title}</td><td>${item.formula}</td><td>${item.memory}</td><td>${item.units[0][2]}</td></tr>`).join('')}</tbody></table></section><section class="card section"><p class="label">Pretvorbe</p><div class="conversion-list">${conversionHtml()}</div></section>`; }
    function progress() { view.innerHTML = `<section class="card section"><p class="label">Moj napredak</p><h2>${progressPercent()}% formula označeno kao sigurno</h2><div class="progress-layout"><div class="ring" style="--progress:${progressPercent()}%"><span>${progressPercent()}%</span></div><div class="progress-stats"><div><span class="stat-icon green">✓</span><b>${knownCount()}</b><small>znam dobro</small></div><div><span class="stat-icon">★</span><b>${formulas.length - knownCount()}</b><small>za ponoviti</small></div><div><span class="stat-icon coral">♧</span><b>${best}</b><small>kviz bodovi</small></div></div></div><div class="stack" style="margin-top:1rem">${formulas.map((item) => `<button class="quick-card" onclick="setPage('formulas')"><span>${item.title}</span><b>${confidence[item.id] === 'known' ? 'Znam dobro' : confidence[item.id] === 'partial' ? 'Djelomično znam' : 'Ne znam'}</b><span>›</span></button>`).join('')}</div><button class="secondary" style="margin-top:1rem" onclick="confidence={}; best=0; save(); progress();">Resetiraj lokalni napredak</button></section>`; }
    function conversionHtml() { return conversions.map((item) => `<article><b class="teal">${item[0]} → ${item[1]}</b><p>${item[2]}</p><small class="muted">${item[3]}</small></article>`).join(''); }
    function openConverter() { converterList.innerHTML = conversionHtml(); converterShade.classList.remove('hidden'); }
    function closeConverter() { converterShade.classList.add('hidden'); }

    render();
  </script>
</body>
</html>
